    <section class="container">

        <h1>FALE CONOSCO</h1>

        <form class="formulario">

            <input type="text" placeholder="Seu nome completo" required pattern="[A-Za-zÀ-ÿ ]{3,}" title="Digite pelo menos 3 letras" />
            <input type="tel" placeholder="Telefone (somente números)" required pattern="\d{10,11}" title="Digite 10 ou 11 dígitos sem espaços" />
            <input type="email" placeholder="E-mail" required title="Digite um e-mail válido" />

            <button type="submit">ENVIAR</button>

        </form>

        <div class="mapa">
